name: Monthly Jira API Token Health Check

on:
  schedule:
    - cron: '0 9 1 * *'   # 9:00 AM UTC on the 1st of every month
  workflow_dispatch:        # allow manual trigger from GitHub Actions tab

jobs:
  check-token:
    runs-on: ubuntu-latest

    steps:
      - name: Test Jira connection via Netlify proxy
        id: check
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://rev1-intake-form.netlify.app/jira-api/rest/api/3/myself")
          echo "http_status=$HTTP_STATUS" >> $GITHUB_OUTPUT
          echo "Netlify proxy responded with HTTP $HTTP_STATUS"

      - name: Create Jira alert issue if connection is failing
        if: steps.check.outputs.http_status != '200'
        env:
          HTTP_STATUS: ${{ steps.check.outputs.http_status }}
        run: |
          CHECKED_AT=$(date -u "+%Y-%m-%d %H:%M UTC")
          curl -s -X POST \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            "https://rev1-intake-form.netlify.app/jira-api/rest/api/3/issue" \
            -d "{
              \"fields\": {
                \"project\": { \"key\": \"REV1\" },
                \"issuetype\": { \"name\": \"Task\" },
                \"summary\": \"[ACTION REQUIRED] REV1 intake form API token may be expired\",
                \"labels\": [\"intake-form-submission\", \"automated-check\"],
                \"description\": {
                  \"type\": \"doc\",
                  \"version\": 1,
                  \"content\": [{
                    \"type\": \"paragraph\",
                    \"content\": [{
                      \"type\": \"text\",
                      \"text\": \"The monthly automated check FAILED (HTTP $HTTP_STATUS). The Jira API token used by the REV1 intake form at https://simondu-zg.github.io/rev1-intake-form/ may need to be renewed. Checked: $CHECKED_AT\"
                    }]
                  }, {
                    \"type\": \"paragraph\",
                    \"content\": [{
                      \"type\": \"text\",
                      \"text\": \"Steps to fix: 1) Generate a new API token at https://id.atlassian.com/manage-profile/security/api-tokens  2) Update the JIRA_API_TOKEN environment variable in Netlify (rev1-intake-form site settings)\"
                    }]
                  }]
                }
              }
            }"

      - name: Log success (no action needed)
        if: steps.check.outputs.http_status == '200'
        run: |
          echo "✅ Monthly check passed — Jira API token is healthy ($(date -u '+%Y-%m-%d %H:%M UTC'))"
          echo "No Jira issue created. Next check: 1st of next month."
